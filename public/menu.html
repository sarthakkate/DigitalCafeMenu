<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Café Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Digital Café Menu</h1>

  <div class="category">
    <h2>Snacks</h2>
    <div class="item" data-name="Samosa" data-price="20">
      <span>Samosa - ₹20</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>

    <div class="item" data-name="Sandwich" data-price="50">
      <span>Sandwich - ₹50</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>
  </div>

  <div class="category">
    <h2>Cold Drinks</h2>
    <div class="item" data-name="Coca-Cola" data-price="30">
      <span>Coca-Cola - ₹30</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>

    <div class="item" data-name="Lassi" data-price="40">
      <span>Lassi - ₹40</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>
  </div>

  <div class="category">
    <h2>Pizza & Pasta</h2>
    <div class="item" data-name="Margherita Pizza" data-price="150">
      <span>Margherita Pizza - ₹150</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>

    <div class="item" data-name="Pasta Alfredo" data-price="120">
      <span>Pasta Alfredo - ₹120</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>
  </div>

  <div class="category">
    <h2>Our Specials</h2>
    <div class="item" data-name="Paneer Tikka" data-price="180">
      <span>Paneer Tikka - ₹180</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>

    <div class="item" data-name="Tandoori Platter" data-price="250">
      <span>Tandoori Platter - ₹250</span>
      <button onclick="changeQty(this, -1)">−</button>
      <span class="qty">0</span>
      <button onclick="changeQty(this, 1)">+</button>
    </div>
  </div>

  <h3>Total: ₹<span id="totalPrice">0</span></h3>
  <button onclick="placeOrder()">Place Order</button>

  <script src="script.js"></script>
</body>
</html>
